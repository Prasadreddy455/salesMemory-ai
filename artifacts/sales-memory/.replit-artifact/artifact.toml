kind = "web"
previewPath = "/"
title = "SalesMemory AI"
version = "1.0.0"
id = "artifacts/sales-memory"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21922

[services.development]
run = "pnpm --filter @workspace/sales-memory run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sales-memory", "run", "build" ]
publicDir = "artifacts/sales-memory/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21922"
BASE_PATH = "/"
